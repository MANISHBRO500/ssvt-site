<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About - SSVT Coaching</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/site.js" defer></script>
  </head>
  <body data-page="about">
    <header class="site-header">
      <nav class="navbar container" aria-label="Main navigation">
        <a class="brand" href="/">
          <span class="brand-mark">S</span>
          <span>
            <strong>SSVT Coaching</strong>
            <small>Jaiptana</small>
          </span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links">
          <a href="/">Home</a>
          <a class="active" href="/about.html">About</a>
          <a href="/student-data.html">Student Data</a>
          <a href="/contact.html">Contact</a>
          <a class="admin-link" href="/admin.html">Admin</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-title">
        <div class="container">
          <p class="eyebrow">About SSVT</p>
          <h1>Events, Memories, and Reviews</h1>
          <p>Photos and public reviews are updated from the admin panel.</p>
        </div>
      </section>

      <section class="section-block">
        <div class="container section-heading">
          <p class="eyebrow">Gallery</p>
          <h2>Event Pictures</h2>
        </div>
        <div id="eventGrid" class="container event-grid" aria-live="polite"></div>
      </section>

      <section class="section-block review-band">
        <div class="container review-layout">
          <div>
            <p class="eyebrow">Public Reviews</p>
            <h2>Share Your Experience</h2>
            <form id="reviewForm" class="review-form">
              <label>
                <span>Your Name</span>
                <input type="text" name="name" maxlength="60" required />
              </label>
              <fieldset class="star-field">
                <legend>Rating</legend>
                <div class="stars-input">
                  <input id="star5" type="radio" name="rating" value="5" checked />
                  <label for="star5">★</label>
                  <input id="star4" type="radio" name="rating" value="4" />
                  <label for="star4">★</label>
                  <input id="star3" type="radio" name="rating" value="3" />
                  <label for="star3">★</label>
                  <input id="star2" type="radio" name="rating" value="2" />
                  <label for="star2">★</label>
                  <input id="star1" type="radio" name="rating" value="1" />
                  <label for="star1">★</label>
                </div>
              </fieldset>
              <label>
                <span>Comment</span>
                <textarea name="comment" rows="4" maxlength="400" required></textarea>
              </label>
              <button class="btn primary" type="submit">Add Review</button>
              <p id="reviewMessage" class="form-message" role="status"></p>
            </form>
          </div>
          <div id="reviewList" class="review-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <p>&copy; <span data-year></span> SSVT Coaching, Jaiptana. All rights reserved.</p>
        <div class="footer-socials" aria-label="Social links">
          <a href="#" aria-label="YouTube">YT</a>
          <a href="#" aria-label="Facebook">FB</a>
          <a href="#" aria-label="Instagram">IG</a>
        </div>
      </div>
    </footer>
  </body>
</html>
